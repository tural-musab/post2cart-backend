name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
      - devserver
      - post2cart
    steps:
      - name: Deploy from self-hosted DevServer runner
        env:
          PROD_HOST_PRIVATE: ${{ secrets.PROD_HOST_PRIVATE }}
        run: |
          set -euo pipefail

          PROD_HOST_PRIVATE="${PROD_HOST_PRIVATE:-10.20.0.3}"

          ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no "root@${PROD_HOST_PRIVATE}" '
            set -euo pipefail
            cd /opt/projects/post2cart-backend
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose -f infra/docker-compose.prod.yml --env-file .env.production up -d --build --remove-orphans
            docker compose -f infra/docker-compose.prod.yml --env-file .env.production ps
          '
