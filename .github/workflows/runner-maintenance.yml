name: Runner Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: '17 1 * * 0'

jobs:
  heartbeat:
    runs-on:
      - self-hosted
      - linux
      - x64
      - devserver
      - post2cart
    timeout-minutes: 10
    steps:
      - name: Runner and host diagnostics
        run: |
          set -euo pipefail
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "host=$(hostname)"
          echo "user=$(whoami)"
          /home/dev/actions-runner-post2cart-backend/bin/Runner.Listener --version || true
          uname -a
          docker --version

      - name: Validate production reachability
        run: |
          set -euo pipefail
          curl -fsS -o /dev/null -w 'api_root_http=%{http_code}\n' https://api.post2cart.com/
          curl -sS -o /dev/null -w 'api_guard_http=%{http_code}\n' https://api.post2cart.com/n8n/sync-state/active
          ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no root@10.20.0.3 \
            'cd /opt/projects/post2cart-backend && echo prod_head=$(git rev-parse --short HEAD)'
